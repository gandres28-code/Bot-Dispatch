<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Centro de Operaciones</title>

<style>
:root{
  --bg:#0f172a;
  --panel:#111827;
  --card:#1f2937;
  --soft:#374151;
  --text:#f9fafb;
  --muted:#9ca3af;
  --green:#10b981;
  --blue:#2563eb;
  --yellow:#f59e0b;
  --red:#ef4444;
  --purple:#7c3aed;
}

*{ box-sizing:border-box; }

body{
  font-family:Arial, sans-serif;
  background:linear-gradient(180deg,#0f172a,#111827);
  color:var(--text);
  padding:16px;
  margin:0;
}

h1{
  text-align:center;
  margin:10px 0 18px;
  font-size:28px;
}

.top-grid{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  max-width:1150px;
  margin:0 auto 18px;
}

@media(min-width:900px){
  .top-grid{
    grid-template-columns:1fr 1fr;
  }
}

.panel{
  background:rgba(31,41,55,.9);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.25);
}

button{
  width:100%;
  padding:14px;
  font-size:16px;
  border:none;
  border-radius:12px;
  margin:8px 0;
  cursor:pointer;
  background:var(--blue);
  color:white;
  font-weight:bold;
}

button:disabled{
  background:#6b7280;
  cursor:not-allowed;
}

.finish-day{ background:var(--green); }
.copy-btn{ background:var(--purple); }
.sent-btn{ background:var(--green); }
.small-btn{
  width:auto;
  padding:10px 12px;
  font-size:14px;
  margin:6px 6px 0 0;
}

input, select{
  width:100%;
  padding:13px;
  font-size:16px;
  border-radius:12px;
  border:1px solid #4b5563;
  background:#111827;
  color:white;
  margin:6px 0;
}

#notificationStatus,
#reportStatus{
  text-align:center;
  margin:8px 0;
  color:#d1d5db;
  font-size:14px;
}

.section-title{
  max-width:1150px;
  margin:22px auto 10px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  gap:10px;
}

.section-title h2{
  margin:0;
  font-size:21px;
}

.badge{
  display:inline-block;
  background:#374151;
  color:#e5e7eb;
  padding:5px 9px;
  border-radius:999px;
  font-size:12px;
  font-weight:bold;
}

.badge.urgent{ background:#7f1d1d; color:#fecaca; }
.badge.normal{ background:#064e3b; color:#bbf7d0; }
.badge.category{ background:#1e3a8a; color:#bfdbfe; }
.badge.sent{ background:#065f46; color:#bbf7d0; }
.badge.pending{ background:#78350f; color:#fde68a; }

.grid{
  max-width:1150px;
  margin:0 auto;
  display:grid;
  grid-template-columns:1fr;
  gap:14px;
}

@media(min-width:900px){
  .grid.reports{
    grid-template-columns:1fr 1fr;
  }
}

.card{
  background:var(--card);
  border:1px solid rgba(255,255,255,.08);
  border-radius:18px;
  padding:16px;
  box-shadow:0 8px 24px rgba(0,0,0,.22);
}

.card.report-card{
  border-left:6px solid var(--blue);
}

.card.report-card.urgent{
  border-left-color:var(--red);
}

.card.report-card.sent{
  opacity:.78;
  border-left-color:var(--green);
}

.event{
  border-left:6px solid var(--green);
}

.time{
  color:var(--muted);
  font-size:13px;
  margin-bottom:5px;
}

.unit{
  font-size:22px;
  font-weight:bold;
  margin-bottom:5px;
}

.meta{
  color:#d1d5db;
  font-size:14px;
  margin:4px 0;
}

.message-box{
  background:#111827;
  border:1px solid #374151;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  white-space:pre-wrap;
  line-height:1.35;
}

.hotsos-box{
  background:#172554;
  border:1px solid #1d4ed8;
  padding:12px;
  border-radius:12px;
  margin-top:10px;
  white-space:pre-wrap;
  line-height:1.35;
}

.photo-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
  margin-top:12px;
}

@media(min-width:650px){
  .photo-grid{
    grid-template-columns:repeat(3,1fr);
  }
}

.photo-grid a{
  display:block;
  border-radius:12px;
  overflow:hidden;
  background:#111827;
  border:1px solid #374151;
}

.photo-grid img{
  width:100%;
  height:130px;
  object-fit:cover;
  display:block;
}

.photo-loading{
  color:#9ca3af;
  font-size:13px;
  margin-top:10px;
}

.empty{
  max-width:1150px;
  margin:0 auto;
  text-align:center;
  color:#9ca3af;
  background:#1f2937;
  border-radius:14px;
  padding:18px;
}
</style>
</head>

<body>

<h1>🚨 Centro de Operaciones</h1>

<audio id="alertSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<div class="top-grid">
  <div class="panel">
    <button onclick="enableNotifications()">
      🔔 Activar sonido y notificaciones
    </button>
    <div id="notificationStatus">Notificaciones: sin activar</div>
  </div>

  <div class="panel">
    <input type="date" id="reportDate">
    <button id="finishDayBtn" class="finish-day" onclick="finalizarDia()">
      📄 Finalizar Día y Descargar Reporte
    </button>
    <div id="reportStatus">Reporte diario: listo para generar</div>
  </div>
</div>

<div class="section-title">
  <h2>🤖 Reportes con IA / HotSOS Assistant</h2>
  <span id="reportsCount" class="badge">0</span>
</div>

<div class="top-grid">
  <input id="searchBox" placeholder="Filtrar por unidad, empleado, categoría o mensaje" oninput="renderReports()">
  <select id="statusFilter" onchange="renderReports()">
    <option value="all">Todos</option>
    <option value="pending">Pendientes HotSOS</option>
    <option value="sent">Enviados a HotSOS</option>
  </select>
</div>

<div id="reports" class="grid reports"></div>

<div class="section-title">
  <h2>📋 Eventos recientes</h2>
  <span id="eventsCount" class="badge">0</span>
</div>

<div id="events" class="grid"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let lastEventId = null;
let lastReportId = null;
let firstLoad = true;
let firstReportLoad = true;
let audioUnlocked = false;
let allReports = [];
let reportPhotosCache = {};

async function enableNotifications(){
  unlockAudio();

  const sound = document.getElementById("alertSound");

  if(sound){
    sound.play().then(() => {
      sound.pause();
      sound.currentTime = 0;
      audioUnlocked = true;
    }).catch(err => console.log("Audio permission pending:", err));
  }

  if(!("Notification" in window)){
    alert("Este navegador no soporta notificaciones.");
    return;
  }

  const permission = await Notification.requestPermission();

  if(permission === "granted"){
    document.getElementById("notificationStatus").innerText =
      "✅ Notificaciones y sonido activados";
    alert("✅ Notificaciones y sonido activados");
  }else{
    document.getElementById("notificationStatus").innerText =
      "❌ Notificaciones bloqueadas";
    alert("❌ Notificaciones bloqueadas. Revisa permisos del navegador.");
  }
}

function unlockAudio(){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);
    gain.gain.value = 0.01;
    osc.frequency.value = 600;
    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);
    audioUnlocked = true;
  }catch(err){
    console.log("Audio unlock error:", err);
  }
}

function playAlert(){
  const sound = document.getElementById("alertSound");
  if(sound){
    sound.currentTime = 0;
    sound.play().catch(error => console.log("Sound blocked:", error));
  }
}

function sendBrowserNotification(title, body){
  if("Notification" in window && Notification.permission === "granted"){
    new Notification(title || "Nueva actualización", { body: body || "Centro de Operaciones" });
  }
}

function todayLocalISO(){
  const formatter = new Intl.DateTimeFormat("en-CA", {
    timeZone:"America/Chicago",
    year:"numeric",
    month:"2-digit",
    day:"2-digit"
  });
  return formatter.format(new Date());
}

function escapeHtml(value){
  return String(value || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function finalizarDia(){
  const selectedDate = document.getElementById("reportDate").value;
  const date = selectedDate || todayLocalISO();
  const btn = document.getElementById("finishDayBtn");
  const status = document.getElementById("reportStatus");

  btn.disabled = true;
  btn.innerText = "⏳ Generando reporte...";
  status.innerText = "Generando y descargando reporte...";

  window.location.href = `/finalizar-dia?date=${date}`;

  setTimeout(() => {
    btn.disabled = false;
    btn.innerText = "📄 Finalizar Día y Descargar Reporte";
    status.innerText = "✅ Reporte solicitado.";
  }, 3000);
}

async function copyText(text){
  try{
    await navigator.clipboard.writeText(text || "");
    alert("✅ Copiado");
  }catch(error){
    alert("No se pudo copiar. Selecciona el texto manualmente.");
  }
}

async function markHotSosSent(reportId){
  try{
    const response = await fetch("/mark-hotsos-sent", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body:JSON.stringify({ reportId })
    });

    const data = await response.json();

    if(!data.ok && !data.success){
      throw new Error(data.message || data.error || "No se pudo marcar enviado");
    }

    await loadReports();
  }catch(error){
    alert("Error: " + error.message);
  }
}

function getReportId(report){
  return report.reportId || report.reportID || report.id || report.pageId || "";
}

async function loadPhotosForReport(report){
  let reportId = getReportId(report);

if (
  reportId &&
  !String(reportId).startsWith("RPT-")
){
  reportId = `RPT-${reportId}`;
}

  if(!reportId){
    return [];
  }

  if(reportPhotosCache[reportId]){
    return reportPhotosCache[reportId];
  }

  try{
    const response = await fetch(`/report-photos?reportId=${encodeURIComponent(reportId)}`);
    const data = await response.json();

    const photos = data.photos || data.items || data.results || [];
    reportPhotosCache[reportId] = photos;

    return photos;
  }catch(error){
    console.log("Error cargando fotos del reporte", reportId, error);
    return [];
  }
}

function getPhotoUrl(photo){
  return photo.photoUrl || photo.url || photo.photoURL || photo["Photo URL"] || "";
}

async function renderPhotoGrid(report){
  const reportId = getReportId(report);
  const target = document.getElementById(`photos-${reportId}`);

  if(!target){
    return;
  }

  const photos = await loadPhotosForReport(report);

  if(!photos || photos.length === 0){
    target.innerHTML = `<div class="photo-loading">No se encontraron fotos guardadas para este reporte.</div>`;
    return;
  }

  target.innerHTML = `
    <div class="photo-grid">
      ${photos.map(photo => {
        const url = getPhotoUrl(photo);
        if(!url) return "";
        return `
          <a href="${escapeHtml(url)}" target="_blank">
            <img src="${escapeHtml(url)}" loading="lazy">
          </a>
        `;
      }).join("")}
    </div>
  `;
}

async function loadReports(){
  try{
    const response = await fetch("/operations-reports");
    const data = await response.json();

    allReports = data.reports || data.events || data.items || [];

    const newest = allReports.length > 0 ? allReports[0] : null;

    if(newest){
      const newestId = getReportId(newest);

      if(firstReportLoad){
        lastReportId = newestId;
        firstReportLoad = false;
      }else if(newestId && newestId !== lastReportId){
        lastReportId = newestId;
        playAlert();
        sendBrowserNotification(
          "Nuevo reporte con IA",
          `${newest.unit || "Unidad"} - ${newest.employee || newest.person || "Empleado"}`
        );
      }
    }

    renderReports();
  }catch(error){
    console.log("Error en loadReports", error);
  }
}

function renderReports(){
  const container = document.getElementById("reports");
  const countBox = document.getElementById("reportsCount");
  const q = String(document.getElementById("searchBox")?.value || "").toLowerCase().trim();
  const filter = document.getElementById("statusFilter")?.value || "all";

  let reports = allReports.slice();

  if(q){
    reports = reports.filter(report => {
      const text = [
        report.unit,
        report.employee,
        report.person,
        report.role,
        report.originalMessage,
        report.message,
        report.aiCategory,
        report.category,
        report.aiSummary,
        report.suggestedHotSosText,
        report.suggestedHotSOS,
        report.hotsosText
      ].join(" ").toLowerCase();

      return text.includes(q);
    });
  }

  if(filter === "pending"){
    reports = reports.filter(report => !report.hotSosSent && !report.hotsosSent && !report.hotSOSSent);
  }

  if(filter === "sent"){
    reports = reports.filter(report => report.hotSosSent || report.hotsosSent || report.hotSOSSent);
  }

  countBox.innerText = reports.length;

  if(reports.length === 0){
    container.innerHTML = `<div class="empty">No hay reportes para mostrar.</div>`;
    return;
  }

  container.innerHTML = reports.map(report => {
    const reportId = getReportId(report);
    const unit = report.unit || "";
    const employee = report.employee || report.person || "";
    const role = report.role || "";
    const time = report.time || report.createdAt || report.date || "";
    const original = report.originalMessage || report.message || "";
    const category = report.aiCategory || report.category || "General Message";
    const priority = report.aiPriority || report.priority || "Normal";
    const summary = report.aiSummary || report.summary || "";
    const hotsosText = report.suggestedHotSosText || report.suggestedHotSOS || report.hotsosText || report.hotSosText || "";
    const photosCount = report.photosCount || report.photoCount || 0;
    const sent = !!(report.hotSosSent || report.hotsosSent || report.hotSOSSent);
    const urgent = String(priority || "").toLowerCase().includes("urgent") || String(priority || "").toLowerCase().includes("blocking");

    return `
      <div class="card report-card ${urgent ? "urgent" : ""} ${sent ? "sent" : ""}">
        <div class="time">${escapeHtml(time)}</div>
        <div class="unit">${escapeHtml(unit)}</div>
        <div class="meta">${escapeHtml(employee)} ${role ? "| " + escapeHtml(role) : ""}</div>

        <div style="margin:8px 0;">
          <span class="badge category">${escapeHtml(category)}</span>
          <span class="badge ${urgent ? "urgent" : "normal"}">${escapeHtml(priority)}</span>
          <span class="badge ${sent ? "sent" : "pending"}">${sent ? "Enviado HotSOS" : "Pendiente HotSOS"}</span>
          <span class="badge">📸 ${escapeHtml(photosCount)} fotos</span>
        </div>

        <div class="message-box"><b>Mensaje original:</b><br>${escapeHtml(original)}</div>

        ${summary ? `<div class="message-box"><b>Resumen IA:</b><br>${escapeHtml(summary)}</div>` : ""}

        ${hotsosText ? `<div class="hotsos-box"><b>Texto sugerido HotSOS:</b><br>${escapeHtml(hotsosText)}</div>` : ""}

        <div id="photos-${escapeHtml(reportId)}" class="photo-loading">
          ${photosCount ? "Cargando fotos..." : "Sin fotos"}
        </div>

        <div style="margin-top:10px;">
          ${hotsosText ? `<button class="copy-btn small-btn" onclick="copyText(\`${String(hotsosText).replace(/`/g,"'").replace(/\\/g,"\\\\")}\`)">📋 Copiar HotSOS</button>` : ""}
          ${reportId ? `<button class="sent-btn small-btn" onclick="markHotSosSent('${escapeHtml(reportId)}')">✅ Marcar enviado</button>` : ""}
        </div>
      </div>
    `;
  }).join("");

  reports.forEach(report => {
    const count = report.photosCount || report.photoCount || 0;
    if(count){
      renderPhotoGrid(report);
    }
  });
}

async function loadEvents(){
  try{
    const response = await fetch("/operations-events");
    const data = await response.json();
    const events = data.events || [];

    document.getElementById("eventsCount").innerText = events.length;

    const newest = events.length > 0 ? events[0] : null;

    if(newest){
      if(firstLoad){
        lastEventId = newest.id;
        firstLoad = false;
      }else if(newest.id !== lastEventId){
        lastEventId = newest.id;
        playAlert();
        sendBrowserNotification(
          newest.action || "Nueva actualización",
          `${newest.unit || "Unidad"} - ${newest.person || "Operación"}`
        );
      }
    }

    const container = document.getElementById("events");

    if(events.length === 0){
      container.innerHTML = `<div class="empty">No hay eventos recientes.</div>`;
      return;
    }

    container.innerHTML = events.map(event => `
      <div class="card event">
        <div class="time">${escapeHtml(event.time || "")}</div>
        <div class="unit">${escapeHtml(event.unit || "")}</div>
        <div>${escapeHtml(event.action || "")}</div>
        <div>${escapeHtml(event.person || "")}</div>
        <div>${escapeHtml(event.note || "")}</div>

        ${event.photoUrl ? `
          <div class="photo-grid">
            <a href="${escapeHtml(event.photoUrl)}" target="_blank">
              <img src="${escapeHtml(event.photoUrl)}" loading="lazy">
            </a>
          </div>
        ` : ""}
      </div>
    `).join("");
  }catch(err){
    console.log(err);
  }
}

loadEvents();
loadReports();

setInterval(loadEvents, 5000);
setInterval(loadReports, 7000);

const socket = io();

socket.on("ops-update", () => {
  reportPhotosCache = {};

  if(typeof loadEvents === "function"){
    loadEvents();
  }

  if(typeof loadReports === "function"){
    loadReports();
  }
});
</script>
</body>
</html>
