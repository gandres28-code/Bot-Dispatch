<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Centro de Operaciones</title>

<style>
body{
  font-family:Arial;
  background:#111827;
  color:white;
  padding:20px;
}

h1{
  text-align:center;
}

button{
  width:100%;
  padding:15px;
  font-size:18px;
  border:none;
  border-radius:10px;
  margin-bottom:20px;
  cursor:pointer;
  background:#2563eb;
  color:white;
  font-weight:bold;
}

.finish-day{
  background:#10b981;
}

.finish-day:disabled{
  background:#6b7280;
  cursor:not-allowed;
}

#notificationStatus,
#reportStatus{
  text-align:center;
  margin-bottom:15px;
  color:#d1d5db;
  font-size:14px;
}

#events{
  margin-top:20px;
}

.event{
  background:#1f2937;
  border-left:6px solid #10b981;
  padding:15px;
  margin-bottom:10px;
  border-radius:10px;
}

.time{
  color:#9ca3af;
  font-size:13px;
}

.unit{
  font-size:20px;
  font-weight:bold;
}
</style>
</head>

<body>

<h1>🚨 Centro de Operaciones</h1>

<audio id="alertSound" preload="auto">
  <source src="https://actions.google.com/sounds/v1/alarms/beep_short.ogg" type="audio/ogg">
</audio>

<button onclick="enableNotifications()">
  🔔 Activar sonido y notificaciones
</button>

<div id="notificationStatus">
  Notificaciones: sin activar
</div>

  <input
  type="date"
  id="reportDate"
  style="
    width:100%;
    padding:15px;
    font-size:18px;
    border-radius:10px;
    margin-bottom:15px;
  "
>
<button id="finishDayBtn" class="finish-day" onclick="finalizarDia()">
  📄 Finalizar Día y Descargar Reporte
</button>

<div id="reportStatus">
  Reporte diario: listo para generar
</div>

<div id="events"></div>

<script>
let lastEventId = null;
let firstLoad = true;
let audioUnlocked = false;

async function enableNotifications(){

  unlockAudio();

  const sound =
    document.getElementById("alertSound");

  if(sound){
    sound.play().then(() => {
      sound.pause();
      sound.currentTime = 0;
      audioUnlocked = true;
    }).catch(err => {
      console.log("Audio permission pending:", err);
    });
  }

  if(!("Notification" in window)){
    alert("Este navegador no soporta notificaciones.");
    return;
  }

  const permission =
    await Notification.requestPermission();

  if(permission === "granted"){
    document.getElementById("notificationStatus").innerText =
      "✅ Notificaciones y sonido activados";
    alert("✅ Notificaciones y sonido activados");
  }else{
    document.getElementById("notificationStatus").innerText =
      "❌ Notificaciones bloqueadas";
    alert("❌ Notificaciones bloqueadas. Revisa permisos del navegador.");
  }
}

function unlockAudio(){
  try{
    const AudioContext =
      window.AudioContext ||
      window.webkitAudioContext;

    const audioCtx =
      new AudioContext();

    const osc =
      audioCtx.createOscillator();

    const gain =
      audioCtx.createGain();

    osc.connect(gain);
    gain.connect(audioCtx.destination);

    gain.gain.value = 0.01;
    osc.frequency.value = 600;

    osc.start();
    osc.stop(audioCtx.currentTime + 0.05);

    audioUnlocked = true;
  }catch(err){
    console.log("Audio unlock error:", err);
  }
}

function playAlert(){

  const sound =
    document.getElementById("alertSound");

  if(sound){
    sound.currentTime = 0;
    sound.play().catch(error => {
      console.log("Sound blocked:", error);
    });
  }

}

function sendBrowserNotification(event){
  if(
    "Notification" in window &&
    Notification.permission === "granted"
  ){
    new Notification(
      event.action || "Nueva actualización",
      {
        body:
          `${event.unit || "Unidad"} - ${event.person || "Operación"}`,
      }
    );
  }
}

function todayLocalISO(){
  const now = new Date();

  const formatter = new Intl.DateTimeFormat("en-CA", {
    timeZone: "America/Chicago",
    year: "numeric",
    month: "2-digit",
    day: "2-digit",
  });

  return formatter.format(now);
}

function finalizarDia(){

  const selectedDate =
    document.getElementById("reportDate").value;

  const date =
    selectedDate || todayLocalISO();

  const btn =
    document.getElementById("finishDayBtn");

  const status =
    document.getElementById("reportStatus");

  btn.disabled = true;
  btn.innerText = "⏳ Generando reporte...";
  status.innerText = "Generando y descargando reporte...";

  window.location.href =
    `/finalizar-dia?date=${date}`;

  setTimeout(() => {
    btn.disabled = false;
    btn.innerText = "📄 Finalizar Día y Descargar Reporte";
    status.innerText = "✅ Reporte solicitado.";
  }, 3000);
}

async function loadEvents(){
  try{
    const response =
      await fetch("/operations-events");

    const data =
      await response.json();

    const newest =
      data.events && data.events.length > 0
        ? data.events[0]
        : null;

    if(newest){
      if(firstLoad){
        lastEventId =
          newest.id;

        firstLoad =
          false;

      }else if(newest.id !== lastEventId){

        lastEventId =
          newest.id;

        playAlert();
        sendBrowserNotification(newest);
      }
    }

    const container =
      document.getElementById("events");

    container.innerHTML =
      "";

  data.events.forEach(event => {
  container.innerHTML += `
    <div class="event">
      <div class="time">${event.time || ""}</div>
      <div class="unit">${event.unit || ""}</div>
      <div>${event.action || ""}</div>
      <div>${event.person || ""}</div>
      <div>${event.note || ""}</div>

      ${event.photoUrl ? `
        <a href="${event.photoUrl}" target="_blank">
          <img
            src="${event.photoUrl}"
            style="
              width:100%;
              max-width:260px;
              margin-top:12px;
              border-radius:12px;
              box-shadow:0 2px 10px rgba(0,0,0,.18);
            "
          >
        </a>
      ` : ""}
    </div>
  `;
});

  }catch(err){
    console.log(err);
  }
}

loadEvents();

setInterval(
  loadEvents,
  5000
);
  const socket = io();

socket.on("ops-update", () => {
  if(typeof loadMaster === "function"){
    loadMaster();
  }

  if(typeof loadCleanerAssignments === "function" && typeof currentCleanerName !== "undefined" && currentCleanerName){
    loadCleanerAssignments();
  }

  if(typeof loadInspectorAssignments === "function" && typeof currentInspectorCode !== "undefined" && currentInspectorCode){
    loadInspectorAssignments();
  }

  if(typeof loadEvents === "function"){
    loadEvents();
  }
});
</script>
<script src="/socket.io/socket.io.js"></script>
</body>
</html>
