<!DOCTYPE html>
<html>
<head>
  <title>Panel de Inspectores</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f4f4f4;
      max-width:600px;
      margin:auto;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:15px;
      margin:10px 0;
      font-size:18px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    textarea{
      min-height:110px;
    }

    button{
      width:100%;
      padding:18px;
      margin:10px 0;
      font-size:19px;
      border:none;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .start{ background:#7c3aed; }
    .ready{ background:#059669; }
    .report{ background:#f59e0b; }
    .supplies{ background:#2563eb; }
    .lost{ background:#111827; }

    #status{
      text-align:center;
      font-weight:bold;
      margin-top:20px;
      font-size:18px;
    }

    #bigStatus{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:22px;
      box-sizing:border-box;
      color:white;
      font-size:22px;
      font-weight:bold;
      text-align:center;
      z-index:9999;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    #bigStatus.success{
      background:#16a34a;
    }

    #bigStatus.error{
      background:#dc2626;
    }

    #bigStatus.loading{
      background:#2563eb;
    }

    .card{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .note-title{
      font-size:14px;
      color:#666;
      margin-top:15px;
    }

    .help{
      font-size:13px;
      color:#777;
      line-height:1.4;
      margin-bottom:10px;
      text-align:center;
    }.assignment-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:12px;
  margin:15px 0;
}

.assignment-card{
  padding:16px;
  border-radius:14px;
  background:#e5e7eb;
  font-weight:bold;
  text-align:center;
  cursor:pointer;
  border:2px solid transparent;
}

.assignment-card.orange{
  background:#f59e0b;
  color:white;
}

.assignment-card.green{
  background:#16a34a;
  color:white;
}

.assignment-card.purple{
  background:#7c3aed;
  color:white;
}

.assignment-card.urgent{
  background:#dc2626;
  color:white;
  animation: blink 1s infinite;
}

.assignment-card.selected{
  border:3px solid #111827;
}

@keyframes blink{
  0%{ opacity:1; }
  50%{ opacity:.45; }
  100%{ opacity:1; }
}
  </style>
</head>

<body>

<div id="bigStatus"></div>

<div class="card">

<h2>🔍 Panel de Inspectores</h2>

<p class="help">
Usa este panel para iniciar inspección, marcar una unidad lista, reportar errores de limpieza o pedir supplies.
</p>

<input id="code" placeholder="Código del inspector">

<button class="start action-btn" onclick="loadInspectorAssignments()">
  🔎 Ver mis inspecciones
</button>

<div id="inspectorName" style="text-align:center; font-weight:bold; margin:15px 0;"></div>

<div id="assignments"></div>

<input id="name" placeholder="Nombre del inspector" style="display:none;">

<input
  id="unit"
  placeholder="Unidad"
  style="display:none;"
>
<div id="inspectionPanel" style="display:none;">
<div class="note-title">
Informe / Problema / Supplies
</div>

<textarea
  id="note"
  placeholder="Escribe aquí qué salió mal, qué falta o qué necesita la unidad..."
></textarea>

  <div class="note-title">
Foto opcional para problemas / Lost & Found
</div>

<input
  type="file"
  id="photoInput"
  accept="image/*"
  capture="environment"
/>
<button class="start action-btn" onclick="sendInspectionAction('INSPECTION_START')">
  🔍 Empezar inspección
</button>

<button class="ready action-btn" onclick="sendInspectionAction('READY_GUEST')">
  ✅ Ready for Guest
</button>

<button class="report action-btn" onclick="sendInspectionAction('INSPECTION_REPORT')">
  📝 Informe de error de limpieza
</button>
 
<button class="lost action-btn" onclick="sendInspectionAction('LOST_FOUND')">
  🎒 Lost & Found
</button>

<button class="supplies action-btn" onclick="sendInspectionAction('INSPECTION_SUPPLIES')">
  🧺 Pedir algo para la unidad
</button>
</div>
<p id="status"></p>

</div>
  
<script>
let isSending = false;
let lastSendKey = "";
let lastSendTime = 0;

function setButtonsDisabled(disabled){
  document.querySelectorAll(".action-btn").forEach(button => {
    button.disabled = disabled;
  });
}

function showBigStatus(message, type){
  const box = document.getElementById("bigStatus");

  box.className = "";
  box.classList.add(type);
  box.innerText = message;
  box.style.display = "block";

  if(type !== "loading"){
    setTimeout(() => {
      box.style.display = "none";
    }, 3500);
  }
}

function playBeep(type){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = "sine";
    oscillator.frequency.value = type === "success" ? 880 : 220;

    gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.25);
  }catch(error){}
}

function vibratePhone(type){
  if(navigator.vibrate){
    if(type === "success"){
      navigator.vibrate([120, 60, 120]);
    }else{
      navigator.vibrate([300, 80, 300]);
    }
  }
}

async function uploadInspectionPhotoIfNeeded(unit, name, action, note){
  const photoInput = document.getElementById("photoInput");
  const file = photoInput.files[0];

  if(!file){
    return "";
  }

  const formData = new FormData();
  formData.append("photo", file);
  formData.append("unit", unit);
  formData.append("name", name);
  formData.append("role", "Inspector");
  formData.append("action", action);
  formData.append("note", note);

  const response = await fetch("/upload-photo", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if(!data.success){
    throw new Error(data.error || "Error subiendo foto");
  }

  return data.photoUrl;
}
let selectedUnit = "";
let currentInspectorCode = "";
let autoRefreshTimer = null;

function getCardClass(status, priority){
  if(String(priority || "").toLowerCase() === "urgent"){
    return "urgent";
  }

  if(status === "Cleaned - Awaiting Inspection"){
    return "orange";
  }

  if(status === "Inspection Started"){
    return "purple";
  }

  if(status === "Ready for Guest"){
    return "green";
  }

  return "";
}

async function loadInspectorAssignments(){
  const code = document.getElementById("code").value.trim();
  currentInspectorCode = code;
localStorage.setItem("inspectorCode", code);

  if(!code){
    alert("Escribe tu código");
    return;
  }

  document.getElementById("assignments").innerHTML = "⏳ Cargando...";

  try{
    const response = await fetch(`/inspector-assignments?code=${encodeURIComponent(code)}`);
    const data = await response.json();

    if(!data.ok){
      document.getElementById("assignments").innerHTML = "";
      alert(data.message || "No se pudieron cargar las inspecciones");
      return;
      
      startInspectorAutoRefresh();
    }

    document.getElementById("name").value = data.inspector;
    document.getElementById("inspectorName").innerText = `Inspector: ${data.inspector}`;

    if(!data.units || data.units.length === 0){
      document.getElementById("assignments").innerHTML =
        "<p style='text-align:center;'>No tienes unidades asignadas hoy.</p>";
      return;
    }

    let html = `<div class="assignment-grid">`;

    data.units.forEach(item => {
      const cardClass = getCardClass(item.status, item.priority);

      html += `
        <div
          class="assignment-card ${cardClass}"
          onclick="selectAssignment('${item.unit.replace(/'/g, "\\'")}')"
          id="card-${item.unit.replace(/[^a-zA-Z0-9]/g, "")}"
        >
          <div>${item.unit}</div>
          <div style="font-size:12px; margin-top:6px;">
            ${item.priority === "Urgent" ? "🚨 URGENTE" : item.status || "Pendiente"}
          </div>
        </div>
      `;
    });

    html += `</div>`;

    document.getElementById("assignments").innerHTML = html;

  }catch(error){
    document.getElementById("assignments").innerHTML = "";
    document.getElementById("inspectionPanel").style.display = "block";
    alert("Error cargando inspecciones");
  }
}

function selectAssignment(unit){
  selectedUnit = unit;

  document.getElementById("unit").value = unit;

  document.querySelectorAll(".assignment-card").forEach(card => {
    card.classList.remove("selected");
  });

  const cardId = "card-" + unit.replace(/[^a-zA-Z0-9]/g, "");
  const card = document.getElementById(cardId);

 if(card){
  card.classList.add("selected");
}

document.getElementById("inspectionPanel").style.display = "block";

showBigStatus(`Unidad seleccionada: ${unit}`, "success");
}
  function startInspectorAutoRefresh(){
  if(autoRefreshTimer){
    return;
  }

  autoRefreshTimer = setInterval(() => {
    if(currentInspectorCode){
      loadInspectorAssignments();
    }
  }, 10000);
}
async function sendInspectionAction(action){

  if(isSending){
    return;
  }

  const name = document.getElementById("name").value.trim();
  const unit = document.getElementById("unit").value.trim().toUpperCase();
  const note = document.getElementById("note").value.trim();

  if(!name){
    alert("Escribe tu nombre");
    return;
  }

  if(!unit){
    alert("Escribe la unidad");
    return;
  }

  if((action === "INSPECTION_REPORT" || action === "INSPECTION_SUPPLIES" || action === "LOST_FOUND") && !note){
    alert("Debes escribir un informe o nota");
    return;
  }

  const photoInput = document.getElementById("photoInput");
  const hasPhoto = photoInput.files.length > 0;

  if((action === "INSPECTION_REPORT" || action === "LOST_FOUND") && !hasPhoto){
    alert("Debes agregar una foto");
    return;
  }

  const sendKey = `${action}-${unit}-${name}-${note}-${hasPhoto}`;
  const now = Date.now();

  if(sendKey === lastSendKey && now - lastSendTime < 30000){
    showBigStatus("⚠️ Ya fue enviado. Espera unos segundos.", "error");
    playBeep("error");
    vibratePhone("error");
    return;
  }

  isSending = true;
  lastSendKey = sendKey;
  lastSendTime = now;

  setButtonsDisabled(true);

  document.getElementById("status").innerText = "⏳ Enviando...";
  showBigStatus("⏳ Enviando...", "loading");

  try{

    let photoUrl = "";

    if(hasPhoto){
      showBigStatus("📸 Subiendo foto...", "loading");
      photoUrl = await uploadInspectionPhotoIfNeeded(unit, name, action, note);
    }

    showBigStatus("⏳ Enviando reporte...", "loading");

    const response = await fetch("/inspector-action",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        action,
        unit,
        note,
        name,
        photoUrl
      })
    });

    const data = await response.json();

    if(data.success){
      document.getElementById("status").innerText =
        data.message || "✅ Enviado";

      showBigStatus(data.message || "✅ Enviado correctamente", "success");
      playBeep("success");
      vibratePhone("success");

      if(action !== "INSPECTION_START"){
        document.getElementById("note").value = "";
      }

      document.getElementById("photoInput").value = "";

    }else{
      document.getElementById("status").innerText =
        data.message || "❌ Error";

      showBigStatus(data.message || "❌ Error", "error");
      playBeep("error");
      vibratePhone("error");
    }

  }catch(error){
    document.getElementById("status").innerText =
      "❌ Error: " + error.message;

    showBigStatus("❌ Error: " + error.message, "error");
    playBeep("error");
    vibratePhone("error");
  }finally{
    isSending = false;
    setButtonsDisabled(false);
  }
}
  const socket = io();

socket.on("ops-update", () => {
  if(typeof loadMaster === "function"){
    loadMaster();
  }

  if(typeof loadCleanerAssignments === "function" && typeof currentCleanerName !== "undefined" && currentCleanerName){
    loadCleanerAssignments();
  }

  if(typeof loadInspectorAssignments === "function" && typeof currentInspectorCode !== "undefined" && currentInspectorCode){
    loadInspectorAssignments();
  }

  if(typeof loadEvents === "function"){
    loadEvents();
  }
});
  window.addEventListener("load", () => {
  const savedCode = localStorage.getItem("inspectorCode");

  if(savedCode){
    document.getElementById("code").value = savedCode;
    currentInspectorCode = savedCode;
    loadInspectorAssignments();
  }
});
  
</script>
<script src="/socket.io/socket.io.js"></script>
</body>
</html>
