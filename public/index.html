<!DOCTYPE html>
<html>
<head>
  <title>Panel de Limpieza</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">

  <style>
    body{
      font-family:Arial,sans-serif;
      padding:20px;
      background:#f4f4f4;
      max-width:600px;
      margin:auto;
    }

    h2{
      text-align:center;
      margin-bottom:20px;
    }

    input, textarea{
      width:100%;
      padding:15px;
      margin:10px 0;
      font-size:18px;
      border-radius:10px;
      border:1px solid #ccc;
      box-sizing:border-box;
    }

    textarea{
      min-height:100px;
    }

    button{
      width:100%;
      padding:18px;
      margin:10px 0;
      font-size:19px;
      border:none;
      border-radius:12px;
      color:white;
      cursor:pointer;
      font-weight:bold;
    }

    button:disabled{
      opacity:.55;
      cursor:not-allowed;
    }

    .start{ background:#16a34a; }
    .done{ background:#dc2626; }
    .issue{ background:#f59e0b; }
    .supplies{ background:#2563eb; }
    .photo{ background:#7c3aed; }
    .lost{ background:#111827; }

    .card{
      background:white;
      padding:20px;
      border-radius:15px;
      box-shadow:0 2px 10px rgba(0,0,0,.08);
    }

    .note-title{
      font-size:14px;
      color:#666;
      margin-top:15px;
    }

    #status{
      text-align:center;
      font-weight:bold;
      margin-top:20px;
      font-size:18px;
    }

    #bigStatus{
      display:none;
      position:fixed;
      top:0;
      left:0;
      width:100%;
      padding:22px;
      box-sizing:border-box;
      color:white;
      font-size:22px;
      font-weight:bold;
      text-align:center;
      z-index:9999;
      box-shadow:0 4px 14px rgba(0,0,0,.25);
    }

    #bigStatus.success{
      background:#16a34a;
    }

    #bigStatus.error{
      background:#dc2626;
    }

    #bigStatus.loading{
      background:#2563eb;
    }
  </style>
</head>

<body>

<div id="bigStatus"></div>

<div class="card">

<h2>🏠 Panel de Limpieza</h2>

<input
  id="name"
  placeholder="Nombre del limpiador"
/>

<input
  id="unit"
  placeholder="Unidad (Ej: 331A)"
/>

<div class="note-title">
Notas / Problemas / Supplies
</div>

<textarea
  id="note"
  placeholder="Escribe aquí si necesitas algo o reportas un problema..."
></textarea>
  <div class="note-title">
Foto opcional
</div>

<input
  type="file"
  id="photoInput"
  accept="image/*"
  capture="environment"
/>

<button
  class="lost action-btn"
  onclick="sendAction('LOST_FOUND')">
  🎒 Lost & Found
</button>

<button
  class="start action-btn"
  onclick="sendAction('START')">
  🟢 Empezar limpieza
</button>

<button
  class="done action-btn"
  onclick="sendAction('DONE')">
  🔴 Terminar limpieza
</button>

<button
  class="supplies action-btn"
  onclick="sendAction('SUPPLIES')">
  🧺 Necesito supplies
</button>

<button
  class="issue action-btn"
  onclick="sendAction('ISSUE')">
  ⚠️ Reportar problema
</button>

<p id="status"></p>

</div>

<script>
let isSending = false;
let lastSendKey = "";
let lastSendTime = 0;

function setButtonsDisabled(disabled){
  document.querySelectorAll(".action-btn").forEach(button => {
    button.disabled = disabled;
  });
}

function showBigStatus(message, type){
  const box = document.getElementById("bigStatus");

  box.className = "";
  box.classList.add(type);
  box.innerText = message;
  box.style.display = "block";

  if(type !== "loading"){
    setTimeout(() => {
      box.style.display = "none";
    }, 3500);
  }
}

function playBeep(type){
  try{
    const AudioContext = window.AudioContext || window.webkitAudioContext;
    const audioCtx = new AudioContext();
    const oscillator = audioCtx.createOscillator();
    const gainNode = audioCtx.createGain();

    oscillator.connect(gainNode);
    gainNode.connect(audioCtx.destination);

    oscillator.type = "sine";
    oscillator.frequency.value = type === "success" ? 880 : 220;

    gainNode.gain.setValueAtTime(0.12, audioCtx.currentTime);
    gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.25);

    oscillator.start(audioCtx.currentTime);
    oscillator.stop(audioCtx.currentTime + 0.25);
  }catch(error){}
}

function vibratePhone(type){
  if(navigator.vibrate){
    if(type === "success"){
      navigator.vibrate([120, 60, 120]);
    }else{
      navigator.vibrate([300, 80, 300]);
    }
  }
}

async function uploadPhotoIfNeeded(unit, name, action, note){
  const photoInput = document.getElementById("photoInput");
  const file = photoInput.files[0];

  if(!file){
    return "";
  }

  const formData = new FormData();
  formData.append("photo", file);
  formData.append("unit", unit);
  formData.append("name", name);
  formData.append("role", "Cleaner");
  formData.append("action", action);
  formData.append("note", note);

  const response = await fetch("/upload-photo", {
    method: "POST",
    body: formData
  });

  const data = await response.json();

  if(!data.success){
    throw new Error(data.error || "Error subiendo foto");
  }

  return data.photoUrl;
}

async function sendAction(action){

  if(isSending){
    return;
  }

  const name = document.getElementById("name").value.trim();
  const unit = document.getElementById("unit").value.trim().toUpperCase();
  const note = document.getElementById("note").value.trim();

  if(!name){
    alert("Escribe tu nombre");
    return;
  }

  if(!unit){
    alert("Escribe la unidad");
    return;
  }

  if((action === "ISSUE" || action === "SUPPLIES" || action === "LOST_FOUND") && !note){
    alert("Debes escribir una nota");
    return;
  }

  const photoInput = document.getElementById("photoInput");
  const hasPhoto = photoInput.files.length > 0;

  if((action === "ISSUE" || action === "LOST_FOUND") && !hasPhoto){
    alert("Debes agregar una foto");
    return;
  }

  const sendKey = `${action}-${unit}-${name}-${note}-${hasPhoto}`;
  const now = Date.now();

  if(sendKey === lastSendKey && now - lastSendTime < 30000){
    showBigStatus("⚠️ Ya fue enviado. Espera unos segundos.", "error");
    playBeep("error");
    vibratePhone("error");
    return;
  }

  isSending = true;
  lastSendKey = sendKey;
  lastSendTime = now;

  setButtonsDisabled(true);

  document.getElementById("status").innerText = "⏳ Enviando...";
  showBigStatus("⏳ Enviando...", "loading");

  try{

    let photoUrl = "";

    if(hasPhoto){
      showBigStatus("📸 Subiendo foto...", "loading");
      photoUrl = await uploadPhotoIfNeeded(unit, name, action, note);
    }

    showBigStatus("⏳ Enviando reporte...", "loading");

    const response = await fetch("/action",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({
        action,
        unit,
        note,
        name,
        photoUrl
      })
    });

    const data = await response.json();

    if(data.success){
      document.getElementById("status").innerText =
        data.message || "✅ Enviado";

      showBigStatus(data.message || "✅ Enviado correctamente", "success");
      playBeep("success");
      vibratePhone("success");

      if(action !== "START"){
        document.getElementById("note").value = "";
      }

      document.getElementById("photoInput").value = "";

    }else{
      document.getElementById("status").innerText =
        data.message || "❌ Error";

      showBigStatus(data.message || "❌ Error", "error");
      playBeep("error");
      vibratePhone("error");
    }

  }catch(error){

    document.getElementById("status").innerText =
      "❌ Error: " + error.message;

    showBigStatus("❌ Error: " + error.message, "error");
    playBeep("error");
    vibratePhone("error");

  }finally{

    isSending = false;
    setButtonsDisabled(false);

  }

}

</script>

</body>
</html>
