<!doctype html><html lang="es"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>Employee Center</title><style>body{font-family:system-ui;background:#f5f7fb;margin:0;color:#172033}.wrap{max-width:1200px;margin:auto;padding:22px}.head,.card,.modalbox{background:white;border-radius:22px;padding:20px;box-shadow:0 12px 30px #17203318}.head{display:flex;justify-content:space-between;gap:12px;align-items:center}.btn{border:0;border-radius:12px;padding:11px 15px;font-weight:800;cursor:pointer}.primary{background:#2563eb;color:white}.grid{display:grid;grid-template-columns:repeat(3,1fr);gap:14px;margin-top:18px}.card h3{margin:0}.muted{color:#6b7280}.badges{display:flex;gap:7px;flex-wrap:wrap;margin:12px 0}.badge{background:#eef2ff;padding:6px 9px;border-radius:999px;font-size:12px;font-weight:800}.actions{display:flex;gap:8px}.modal{position:fixed;inset:0;background:#0007;display:none;place-items:center;padding:18px}.modal.open{display:grid}.modalbox{width:min(700px,100%);max-height:90vh;overflow:auto}.form{display:grid;grid-template-columns:1fr 1fr;gap:12px}.form label{font-size:12px;font-weight:800}.form input,.form select,.form textarea{width:100%;box-sizing:border-box;padding:11px;border:1px solid #dbe2ea;border-radius:11px;margin-top:5px}.full{grid-column:1/-1}@media(max-width:800px){.grid{grid-template-columns:1fr}.form{grid-template-columns:1fr}.full{grid-column:auto}}</style></head><body><main class="wrap"><section class="head"><div><h1>👥 Employee Center</h1><div class="muted">Crear, editar, activar y administrar empleados.</div></div><button class="btn primary" onclick="openForm()">＋ Nuevo empleado</button></section><section id="grid" class="grid"></section></main><div id="modal" class="modal"><form id="form" class="modalbox"><h2 id="title">Nuevo empleado</h2><input type="hidden" id="id"><div class="form"><label>Nombre<input id="name" required></label><label>Código<input id="code" required></label><label>Rol<select id="role"><option>Cleaner</option><option>Inspector</option><option>Cleaner / Inspector</option><option>Dispatch / Inspector</option><option>Laundry / Activities / Runner</option><option>Manager</option><option>Admin</option></select></label><label>Tipo de pago<select id="payType"><option value="hourly">Por hora</option><option value="unit">Por unidad</option></select></label><label>Tarifa por hora<input id="hourlyRate" type="number" step=".01"></label><label>Tarifa por unidad<input id="unitRate" type="number" step=".01"></label><label>Teléfono<input id="phone"></label><label>Correo<input id="email" type="email"></label><label class="full">Ubicaciones<input id="locations" placeholder="Hotel, Chateau, Oficina"></label><label class="full">Notas<textarea id="notes"></textarea></label><label><input id="active" type="checkbox" checked> Activo</label></div><div class="actions" style="margin-top:16px"><button class="btn primary" type="submit">Guardar</button><button class="btn" type="button" onclick="closeForm()">Cancelar</button></div></form></div><script>let employees=[];const $=id=>document.getElementById(id);async function load(){const d=await fetch('/api/v2/employees?active=0&t='+Date.now()).then(r=>r.json());employees=d.employees||[];$('grid').innerHTML=employees.map(e=>`<article class="card"><h3>${esc(e.name)}</h3><div class="muted">${esc(e.role)}</div><div class="badges"><span class="badge">Código ${esc(e.code)}</span><span class="badge">${e.active?'Activo':'Inactivo'}</span><span class="badge">${esc(e.payType||'hourly')}</span></div><div class="actions"><button class="btn primary" onclick="edit(${e.id})">Editar</button><button class="btn" onclick="toggle(${e.id},${!e.active})">${e.active?'Desactivar':'Activar'}</button></div></article>`).join('')||'<div class="card">No hay empleados.</div>'}function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}function openForm(e={}){$('id').value=e.id||'';$('name').value=e.name||'';$('code').value=e.code||'';$('role').value=e.role||'Cleaner';$('payType').value=e.payType||'hourly';$('hourlyRate').value=e.hourlyRate||0;$('unitRate').value=e.unitRate||0;$('phone').value=e.phone||'';$('email').value=e.email||'';$('locations').value=(e.workLocations||[]).join(', ');$('notes').value=e.notes||'';$('active').checked=e.active!==false;$('title').textContent=e.id?'Editar empleado':'Nuevo empleado';$('modal').classList.add('open')}function closeForm(){$('modal').classList.remove('open')}function edit(id){openForm(employees.find(x=>Number(x.id)===Number(id)))}async function toggle(id,active){await fetch('/api/v2/employees/'+id+'/status',{method:'PATCH',headers:{'Content-Type':'application/json'},body:JSON.stringify({active})});load()}$('form').onsubmit=async ev=>{ev.preventDefault();const id=$('id').value;const body={name:$('name').value,code:$('code').value,role:$('role').value,payType:$('payType').value,hourlyRate:$('hourlyRate').value,unitRate:$('unitRate').value,phone:$('phone').value,email:$('email').value,workLocations:$('locations').value.split(',').map(x=>x.trim()).filter(Boolean),notes:$('notes').value,active:$('active').checked};const r=await fetch(id?'/api/v2/employees/'+id:'/api/v2/employees',{method:id?'PUT':'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});const d=await r.json();if(!r.ok)return alert(d.message||'No se pudo guardar');closeForm();load()};load();</script></body></html>
