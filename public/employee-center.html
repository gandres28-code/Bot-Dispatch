<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Employee Center · 417 Maid OS</title>
  <meta name="theme-color" content="#0f172a">
  <style>
    :root{--ink:#0f172a;--muted:#667085;--line:#e5e7eb;--blue:#2563eb;--shadow:0 18px 45px rgba(15,23,42,.10);--soft-shadow:0 8px 24px rgba(15,23,42,.07)}
    *{box-sizing:border-box}html,body{min-height:100%}body{margin:0;font-family:-apple-system,BlinkMacSystemFont,"SF Pro Display","Segoe UI",Arial,sans-serif;color:var(--ink);background:radial-gradient(circle at 0 0,rgba(37,99,235,.13),transparent 30%),radial-gradient(circle at 100% 0,rgba(124,58,237,.10),transparent 28%),linear-gradient(180deg,#f8fafc,#eef2f7)}
    button,input,select{font:inherit}button{cursor:pointer}.page{width:min(1440px,100%);margin:auto;padding:22px}.hero{display:flex;justify-content:space-between;align-items:flex-start;gap:20px;padding:26px;color:white;border-radius:28px;background:radial-gradient(circle at 90% 10%,rgba(96,165,250,.42),transparent 28%),linear-gradient(135deg,#0f172a,#1e293b 60%,#312e81);box-shadow:var(--shadow)}
    .eyebrow{display:inline-flex;align-items:center;gap:8px;padding:7px 11px;border:1px solid rgba(255,255,255,.16);border-radius:999px;background:rgba(255,255,255,.10);color:#dbeafe;font-size:12px;font-weight:900}h1{margin:14px 0 7px;font-size:clamp(30px,4vw,46px);letter-spacing:-.055em;line-height:1}.hero p{margin:0;max-width:720px;color:#dbe4f0;line-height:1.5}.hero-actions{display:flex;gap:10px;flex-wrap:wrap;justify-content:flex-end}.btn{border:none;border-radius:15px;padding:12px 16px;font-weight:900;transition:.18s ease}.btn:hover{transform:translateY(-1px)}.btn-primary{color:white;background:linear-gradient(135deg,#2563eb,#7c3aed);box-shadow:0 12px 24px rgba(37,99,235,.25)}.btn-secondary{color:#0f172a;background:white}
    .stats{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:14px;margin:18px 0}.stat{padding:18px;border:1px solid rgba(255,255,255,.9);border-radius:22px;background:rgba(255,255,255,.92);box-shadow:var(--soft-shadow)}.stat span{display:block;color:var(--muted);font-size:12px;font-weight:850}.stat strong{display:block;margin-top:5px;font-size:28px;letter-spacing:-.04em}
    .toolbar{display:grid;grid-template-columns:minmax(220px,1fr) 220px 180px auto;gap:12px;padding:14px;border:1px solid rgba(255,255,255,.9);border-radius:22px;background:rgba(255,255,255,.92);box-shadow:var(--soft-shadow);position:sticky;top:10px;z-index:10;backdrop-filter:blur(16px)}.control{width:100%;min-height:46px;border:1px solid var(--line);border-radius:14px;padding:0 14px;color:var(--ink);background:white;outline:none}.control:focus{border-color:#93c5fd;box-shadow:0 0 0 4px rgba(37,99,235,.10)}.status-message{margin:14px 2px;color:var(--muted);font-size:13px;font-weight:800}
    .employee-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:14px}.employee-card{position:relative;overflow:hidden;border:1px solid rgba(226,232,240,.9);border-radius:24px;padding:18px;background:rgba(255,255,255,.96);box-shadow:var(--soft-shadow);transition:.18s ease}.employee-card:hover{transform:translateY(-3px);box-shadow:0 18px 38px rgba(15,23,42,.12)}.employee-card::before{content:"";position:absolute;inset:0 auto 0 0;width:5px;background:var(--blue)}.employee-card.inactive::before{background:#94a3b8}.employee-head{display:flex;align-items:center;gap:13px}.avatar{width:52px;height:52px;flex:0 0 auto;display:grid;place-items:center;border-radius:18px;color:white;background:linear-gradient(135deg,#0f172a,#2563eb);font-size:20px;font-weight:950;box-shadow:0 10px 22px rgba(37,99,235,.18)}.employee-title{min-width:0}.employee-title strong{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:17px}.employee-title span{display:block;margin-top:3px;color:var(--muted);font-size:13px;font-weight:750}.badges{display:flex;flex-wrap:wrap;gap:7px;margin:16px 0 13px}.badge{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:7px 10px;font-size:11px;font-weight:900}.badge.active{color:#166534;background:#dcfce7}.badge.inactive{color:#475569;background:#e2e8f0}.badge.code{color:#1d4ed8;background:#dbeafe}.badge.pay{color:#6d28d9;background:#ede9fe}.employee-meta{display:grid;grid-template-columns:1fr 1fr;gap:9px}.meta{padding:11px;border-radius:15px;background:#f8fafc}.meta small{display:block;color:var(--muted);font-size:10px;font-weight:850;text-transform:uppercase;letter-spacing:.05em}.meta strong{display:block;margin-top:4px;font-size:13px;overflow-wrap:anywhere}.empty{grid-column:1/-1;padding:45px 20px;text-align:center;border:1px dashed #cbd5e1;border-radius:24px;background:rgba(255,255,255,.75);color:var(--muted)}.skeleton{height:238px;border-radius:24px;background:linear-gradient(90deg,#e9eef5 25%,#f8fafc 50%,#e9eef5 75%);background-size:200% 100%;animation:loading 1.2s infinite}@keyframes loading{to{background-position:-200% 0}}
    @media(max-width:1000px){.employee-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.toolbar{grid-template-columns:1fr 1fr}.stats{grid-template-columns:repeat(2,minmax(0,1fr))}}@media(max-width:640px){.page{padding:12px}.hero{padding:20px;border-radius:24px;flex-direction:column}.hero-actions{width:100%}.hero-actions .btn{flex:1}.toolbar{grid-template-columns:1fr;position:static}.employee-grid{grid-template-columns:1fr}.stats{gap:9px}.stat{padding:14px}.stat strong{font-size:23px}}
  </style>
</head>
<body>
  <main class="page">
    <section class="hero"><div><span class="eyebrow">👥 417 Maid OS · People</span><h1>Employee Center</h1><p>Consulta empleados, códigos, roles, tarifas y estado desde una sola pantalla. Esta primera versión lee PostgreSQL.</p></div><div class="hero-actions"><button class="btn btn-secondary" id="refreshButton" type="button">↻ Actualizar</button><button class="btn btn-primary" id="newEmployeeButton" type="button">＋ Nuevo empleado</button></div></section>
    <section class="stats"><article class="stat"><span>Total</span><strong id="totalEmployees">0</strong></article><article class="stat"><span>Activos</span><strong id="activeEmployees">0</strong></article><article class="stat"><span>Inactivos</span><strong id="inactiveEmployees">0</strong></article><article class="stat"><span>Roles</span><strong id="totalRoles">0</strong></article></section>
    <section class="toolbar"><input class="control" id="searchInput" type="search" placeholder="Buscar nombre, código o rol…"><select class="control" id="roleFilter"><option value="">Todos los roles</option></select><select class="control" id="statusFilter"><option value="all">Todos</option><option value="active">Activos</option><option value="inactive">Inactivos</option></select><button class="btn btn-secondary" id="clearFiltersButton" type="button">Limpiar</button></section>
    <div class="status-message" id="statusMessage">Cargando empleados…</div><section class="employee-grid" id="employeeGrid" aria-live="polite"></section>
  </main>
  <script>
    const state={employees:[],filtered:[],loading:false};const $=id=>document.getElementById(id);const text=(value,fallback="")=>String(value??"").trim()||fallback;
    function money(value){const n=Number(value);return Number.isFinite(n)?new Intl.NumberFormat("en-US",{style:"currency",currency:"USD"}).format(n):"—"}
    function normalizeEmployee(raw={}){const name=text(raw.name||raw.employeeName||raw.employee_name,"Sin nombre");const role=text(raw.role||raw.employeeRole||raw.employee_role,"Sin rol");const code=text(raw.code||raw.employeeCode||raw.employee_code,"Sin código");const activeValue=raw.active??raw.isActive??raw.is_active;return{...raw,id:raw.id||raw.employeeId||raw.employee_id||"",name,role,code,active:activeValue===undefined?true:Boolean(activeValue),payType:text(raw.payType||raw.pay_type||raw.paymentType||raw.payment_type),rate:raw.rate??raw.hourlyRate??raw.hourly_rate??raw.payRate??raw.pay_rate??null}}
    function initials(name){return text(name,"?").split(/\s+/).slice(0,2).map(part=>part[0]||"").join("").toUpperCase()}
    function escapeHtml(value){return String(value??"").replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;")}
    function renderSkeletons(){$("employeeGrid").innerHTML=Array.from({length:6},()=>'<div class="skeleton" aria-hidden="true"></div>').join("")}
    function updateStats(){const active=state.employees.filter(e=>e.active).length;const roles=new Set(state.employees.map(e=>e.role.toLowerCase()).filter(Boolean));$("totalEmployees").textContent=state.employees.length;$("activeEmployees").textContent=active;$("inactiveEmployees").textContent=state.employees.length-active;$("totalRoles").textContent=roles.size}
    function populateRoleFilter(){const current=$("roleFilter").value;const roles=[...new Set(state.employees.map(e=>e.role).filter(Boolean))].sort((a,b)=>a.localeCompare(b));$("roleFilter").innerHTML='<option value="">Todos los roles</option>'+roles.map(role=>`<option value="${escapeHtml(role.toLowerCase())}">${escapeHtml(role)}</option>`).join("");$("roleFilter").value=current}
    function applyFilters(){const query=$("searchInput").value.trim().toLowerCase();const role=$("roleFilter").value;const status=$("statusFilter").value;state.filtered=state.employees.filter(e=>{const haystack=`${e.name} ${e.code} ${e.role}`.toLowerCase();return(!query||haystack.includes(query))&&(!role||e.role.toLowerCase()===role)&&(status==="all"||(status==="active"&&e.active)||(status==="inactive"&&!e.active))});renderEmployees()}
    function renderEmployees(){const grid=$("employeeGrid");if(!state.filtered.length){grid.innerHTML='<div class="empty"><div style="font-size:34px">🔎</div><strong>No encontré empleados con esos filtros.</strong><div style="margin-top:6px">Prueba otro nombre, código, rol o estado.</div></div>';$("statusMessage").textContent="0 empleados mostrados";return}grid.innerHTML=state.filtered.map(e=>`<article class="employee-card ${e.active?"":"inactive"}" data-employee-id="${escapeHtml(e.id)}"><div class="employee-head"><div class="avatar">${escapeHtml(initials(e.name))}</div><div class="employee-title"><strong>${escapeHtml(e.name)}</strong><span>${escapeHtml(e.role)}</span></div></div><div class="badges"><span class="badge ${e.active?"active":"inactive"}">${e.active?"● Activo":"● Inactivo"}</span><span class="badge code">Código ${escapeHtml(e.code)}</span>${e.payType?`<span class="badge pay">${escapeHtml(e.payType)}</span>`:""}</div><div class="employee-meta"><div class="meta"><small>Tarifa</small><strong>${money(e.rate)}</strong></div><div class="meta"><small>ID</small><strong>${escapeHtml(e.id||"—")}</strong></div></div></article>`).join("");$("statusMessage").textContent=`${state.filtered.length} de ${state.employees.length} empleados mostrados`}
    async function loadEmployees(force=false){if(state.loading)return;state.loading=true;$("refreshButton").disabled=true;$("statusMessage").textContent="Cargando empleados…";renderSkeletons();try{const url=`/api/v2/employees?active=0${force?`&t=${Date.now()}`:""}`;const response=await fetch(url,{headers:{Accept:"application/json"},cache:force?"no-store":"default"});const data=await response.json().catch(()=>({}));if(!response.ok||!data.ok)throw new Error(data.message||`Error ${response.status}`);state.employees=(data.employees||[]).map(normalizeEmployee).sort((a,b)=>a.active!==b.active?(a.active?-1:1):a.name.localeCompare(b.name));updateStats();populateRoleFilter();applyFilters()}catch(error){state.employees=[];state.filtered=[];updateStats();$("employeeGrid").innerHTML=`<div class="empty"><div style="font-size:34px">⚠️</div><strong>No se pudieron cargar los empleados.</strong><div style="margin-top:6px">${escapeHtml(error.message)}</div></div>`;$("statusMessage").textContent="Error cargando Employee Center"}finally{state.loading=false;$("refreshButton").disabled=false}}
    $("searchInput").addEventListener("input",applyFilters);$("roleFilter").addEventListener("change",applyFilters);$("statusFilter").addEventListener("change",applyFilters);$("clearFiltersButton").addEventListener("click",()=>{$("searchInput").value="";$("roleFilter").value="";$("statusFilter").value="all";applyFilters()});$("refreshButton").addEventListener("click",()=>loadEmployees(true));$("newEmployeeButton").addEventListener("click",()=>alert("En el siguiente paso conectaremos el formulario para crear empleados."));window.applyRealtimeUpdate=function(event={}){const name=String(event.type||event.action||"").toLowerCase();if(name.includes("employee"))loadEmployees(true)};window.refreshAll=()=>loadEmployees(true);document.addEventListener("DOMContentLoaded",()=>loadEmployees(false));
  </script>
</body>
</html>
